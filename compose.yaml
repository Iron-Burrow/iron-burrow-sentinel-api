# Development compose file.
# Usage:
#   docker compose up          — start all services
#   docker compose up app      — start only the app (and its dependency, postgres)
#   docker compose logs -f     — follow logs
#   docker compose down -v     — stop and remove volumes

name: iron-burrow-sentinel-api

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iron_burrow_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-iron_burrow_sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm db:migrate && pnpm dev"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-iron_burrow_sentinel}
      PORT: 3000
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET:-dev-sentinel-api-key-hash-secret-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-dev-sentinel-session-secret-change-me}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_COST_UNITS: ${RATE_LIMIT_COST_UNITS:-600}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app                                      # live-reload: source is bind-mounted
      - node-modules:/app/node_modules              # isolate node_modules from the host
      - pnpm-store:/root/.local/share/pnpm/store    # cache pnpm downloads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  pnpm-store:
  node-modules:
